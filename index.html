<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 말해봐!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #f5a623;
    --accent3: #00d4aa;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* ── 화면 전환 ── */
  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px; }
  .screen.active { display: flex; }

  /* ── 헤더 ── */
  .logo {
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }
  .logo span { color: var(--accent); }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }

  /* ── 버튼 ── */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    margin-bottom: 12px;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-green { background: var(--accent3); color: #000; }
  .btn-sm {
    width: auto;
    padding: 10px 20px;
    font-size: 0.85rem;
    margin-bottom: 0;
    border-radius: 10px;
  }

  /* ── 인풋 ── */
  .input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--muted); }

  /* ── 카드 ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  /* ── 라벨 ── */
  .label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  /* ── 로비 화면 ── */
  #screen-lobby .room-code {
    font-size: 2.5rem;
    font-weight: 900;
    text-align: center;
    letter-spacing: 8px;
    color: var(--accent2);
    margin: 8px 0;
  }
  .player-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .player-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .player-chip.host::after { content: ' 👑'; }
  .player-chip.me { border-color: var(--accent3); color: var(--accent3); }

  /* ── 게임 화면 ── */
  #screen-game { padding: 0; }

  .game-header {
    background: var(--surface);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .round-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .timer-bar-wrap {
    flex: 1;
    margin: 0 12px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: var(--accent2);
    border-radius: 3px;
    transition: width 1s linear, background 0.5s;
  }
  .timer-num { font-weight: 700; font-size: 0.9rem; min-width: 24px; text-align: right; }

  /* 출제자 패널 */
  .questioner-panel {
    margin: 16px 20px;
    padding: 20px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid var(--accent);
    border-radius: 20px;
  }
  .word-reveal {
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    color: var(--accent2);
    margin: 12px 0;
    letter-spacing: 2px;
  }
  .category-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    margin-bottom: 8px;
  }

  /* 정답자 대기 패널 */
  .guesser-panel {
    margin: 16px 20px;
    padding: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    text-align: center;
  }
  .questioner-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 8px;
  }
  .hint-display {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px;
    min-height: 60px;
    font-size: 1rem;
    line-height: 1.6;
    text-align: left;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* 채팅 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .chat-msg.me { align-self: flex-end; align-items: flex-end; }
  .chat-msg.other { align-self: flex-start; }
  .chat-msg.system { align-self: center; max-width: 100%; }
  .msg-name { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.4;
    word-break: break-all;
  }
  .chat-msg.me .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.other .msg-bubble { background: var(--surface); border-bottom-left-radius: 4px; }
  .chat-msg.system .msg-bubble {
    background: transparent;
    color: var(--accent2);
    font-weight: 700;
    font-size: 0.85rem;
    text-align: center;
    padding: 6px 0;
  }
  .correct-msg .msg-bubble { background: var(--accent3) !important; color: #000 !important; font-weight: 700; }

  /* 힌트 입력 (출제자) */
  .hint-input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .hint-input-row { display: flex; gap: 8px; }
  .hint-input-row .input { margin-bottom: 0; flex: 1; }

  /* 정답 입력 (정답자) */
  .answer-input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .answer-input-row { display: flex; gap: 8px; }
  .answer-input-row .input { margin-bottom: 0; flex: 1; }

  /* ── 결과 화면 ── */
  #screen-result { text-align: center; }
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin: 24px 0; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .podium-rank { font-size: 1.5rem; }
  .podium-name { font-size: 0.8rem; font-weight: 700; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-score { font-size: 0.9rem; color: var(--accent2); font-weight: 700; }
  .podium-bar { width: 60px; border-radius: 8px 8px 0 0; }
  .p1 .podium-bar { background: var(--accent2); height: 100px; }
  .p2 .podium-bar { background: var(--muted); height: 70px; }
  .p3 .podium-bar { background: #cd7f32; height: 50px; }

  .rank-list { text-align: left; }
  .rank-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 8px;
    gap: 12px;
  }
  .rank-num { font-size: 1.2rem; font-weight: 900; width: 28px; }
  .rank-name { flex: 1; font-weight: 600; }
  .rank-score { color: var(--accent2); font-weight: 700; }

  /* 로딩 */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 정답 오버레이 */
  .correct-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,212,170,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .correct-overlay.show { opacity: 1; }
  .correct-overlay-text {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent3);
    text-shadow: 0 0 30px rgba(0,212,170,0.8);
    animation: pop 0.4s ease;
  }
  @keyframes pop { 0% { transform: scale(0.5); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .text-center { text-align: center; }
  .text-muted { color: var(--muted); font-size: 0.85rem; }
  .mt-auto { margin-top: auto; }
  .mb-8 { margin-bottom: 8px; }
  .gap-row { display: flex; gap: 8px; }
</style>
</head>
<body>
<div id="app">

  <!-- ① 시작 화면 -->
  <div class="screen active" id="screen-home">
    <div style="margin-top: 60px;">
      <div class="logo">🎯 말<span>해</span>봐!</div>
      <div class="subtitle">설명하면 맞추는 실시간 퀴즈</div>
    </div>
    <div class="card">
      <div class="label">닉네임</div>
      <input class="input" id="input-name" placeholder="닉네임 입력" maxlength="8">
    </div>
    <button class="btn btn-primary" onclick="goCreateRoom()">🏠 방 만들기</button>
    <div style="text-align:center; color:var(--muted); font-size:0.85rem; margin: 4px 0 12px;">또는</div>
    <div class="card">
      <div class="label">방 코드 입력</div>
      <div class="gap-row">
        <input class="input" id="input-room-code" placeholder="예: A1B2" maxlength="4" style="text-transform:uppercase; margin-bottom:0; letter-spacing:4px; font-weight:700;">
        <button class="btn btn-green btn-sm" style="white-space:nowrap" onclick="goJoinRoom()">입장</button>
      </div>
    </div>
    <div class="mt-auto text-center text-muted" style="padding: 20px 0;">
      영화·음식·나라·동물 랜덤 제시어<br>설명하고 맞추고 점수 쌓기!
    </div>
  </div>

  <!-- ② 로비 화면 -->
  <div class="screen" id="screen-lobby">
    <div class="logo" style="font-size:1.4rem; margin-top:20px;">🎯 말해봐!</div>
    <div class="card" style="text-align:center; margin-top:16px;">
      <div class="label">방 코드</div>
      <div class="room-code" id="lobby-room-code">----</div>
      <div class="text-muted">친구들에게 코드를 알려주세요</div>
    </div>
    <div class="card">
      <div class="label">참가자 <span id="lobby-count">0</span>명</div>
      <div class="player-list" id="lobby-players"></div>
    </div>
    <div id="lobby-host-section" style="display:none;">
      <div class="card" style="background: var(--surface);">
        <div class="label">라운드 설정</div>
        <div class="gap-row" style="align-items:center; margin-bottom:8px;">
          <span style="font-size:0.9rem;">라운드 수</span>
          <select class="input" id="select-rounds" style="margin-bottom:0; width:auto; flex:1;">
            <option value="5">5라운드</option>
            <option value="8" selected>8라운드</option>
            <option value="10">10라운드</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-start" onclick="startGame()">🎮 게임 시작!</button>
    </div>
    <div id="lobby-guest-section" style="display:none;">
      <div class="card text-center">
        <div class="spinner"></div>
        <div class="text-muted">방장이 게임을 시작하길 기다리는 중...</div>
      </div>
    </div>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="leaveRoom()">나가기</button>
  </div>

  <!-- ③ 게임 화면 -->
  <div class="screen" id="screen-game">
    <div class="game-header">
      <div class="round-badge" id="game-round-badge">1/8</div>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar" style="width:100%"></div>
      </div>
      <div class="timer-num" id="timer-num">60</div>
    </div>

    <!-- 출제자 뷰 -->
    <div id="questioner-view" style="display:none; padding: 0 20px; margin-top: 16px;">
      <div class="questioner-panel">
        <div class="label" style="margin-bottom:4px;">제시어 (나만 보임)</div>
        <div style="margin-bottom: 6px;"><span class="category-badge" id="word-category">영화</span></div>
        <div class="word-reveal" id="word-display">???</div>
        <div class="text-muted" style="font-size:0.8rem; text-align:center;">직접 제시어를 말하면 안 돼요!</div>
      </div>
    </div>

    <!-- 정답자 뷰 -->
    <div id="guesser-view" style="display:none; padding: 0 20px; margin-top: 16px;">
      <div class="guesser-panel">
        <div class="questioner-name" id="questioner-name-display">○○가 설명 중</div>
        <div class="label" style="text-align:left; margin-bottom:6px;">힌트</div>
        <div class="hint-display" id="hint-display">힌트를 기다리는 중...</div>
      </div>
    </div>

    <div class="chat-area" id="chat-area"></div>

    <!-- 출제자 힌트 입력 -->
    <div class="hint-input-area" id="hint-input-area" style="display:none;">
      <div class="hint-input-row">
        <input class="input" id="hint-input" placeholder="힌트 입력 (제시어 직접 말하면 안됨!)" maxlength="50">
        <button class="btn btn-primary btn-sm" onclick="sendHint()">전송</button>
      </div>
    </div>

    <!-- 정답자 정답 입력 -->
    <div class="answer-input-area" id="answer-input-area" style="display:none;">
      <div class="answer-input-row">
        <input class="input" id="answer-input" placeholder="정답 입력..." maxlength="20">
        <button class="btn btn-green btn-sm" onclick="submitAnswer()">제출</button>
      </div>
    </div>
  </div>

  <!-- ④ 결과 화면 -->
  <div class="screen" id="screen-result">
    <div class="logo" style="font-size:1.4rem; margin-top: 24px;">🏆 최종 결과</div>
    <div class="podium" id="result-podium"></div>
    <div class="rank-list" id="result-rank-list"></div>
    <div style="margin-top: 24px;">
      <button class="btn btn-primary" id="btn-play-again" onclick="playAgain()" style="display:none;">한 판 더!</button>
      <button class="btn btn-secondary" onclick="goHome()">처음으로</button>
    </div>
  </div>

</div>

<!-- 정답 오버레이 -->
<div class="correct-overlay" id="correct-overlay">
  <div class="correct-overlay-text">🎉 정답!</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, push, remove, serverTimestamp, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp9TYq3TQEUCO5qge2SVsjUaDcplEYTwM",
  authDomain: "qiuz-441e9.firebaseapp.com",
  databaseURL: "https://qiuz-441e9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "qiuz-441e9",
  storageBucket: "qiuz-441e9.firebasestorage.app",
  messagingSenderId: "1087947884980",
  appId: "1:1087947884980:web:5b2f948c91e20b28148ae1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 제시어 DB ──
const WORDS = {
  "🎬 영화/드라마": ["기생충","인터스텔라","어벤져스","타이타닉","해리포터","반지의제왕","레옹","올드보이","공동경비구역JSA","범죄도시","신과함께","괴물","베테랑","군함도","극한직업","부산행","오징어게임","이상한변호사우영우","이태원클라쓰","사내맞선"],
  "🍔 음식": ["삼겹살","치킨","짜장면","냉면","비빔밥","된장찌개","순대","떡볶이","라면","김치찌개","삼계탕","갈비","초밥","피자","햄버거","파스타","마라탕","탕후루","흑당버블티","타코"],
  "🌍 나라/도시": ["프랑스","일본","브라질","호주","이집트","캐나다","멕시코","인도","터키","아르헨티나","서울","도쿄","파리","뉴욕","런던","두바이","바르셀로나","방콕","베니스","시드니"],
  "🐾 동물": ["판다","기린","문어","독수리","코알라","플라밍고","카멜레온","북극곰","만타가오리","타조","카피바라","해달","미어캣","알파카","악어","해파리","가오리","치타","고릴라","펭귄"],
  "🎵 연예인/아이돌": ["BTS","블랙핑크","뉴진스","아이브","에스파","세븐틴","스트레이키즈","르세라핌","NCT","샤이니","빅뱅","소녀시대","2NE1","엑소","방탄소년단","트와이스","레드벨벳","있지","(여자)아이들","케플러"]
};

const CATEGORIES = Object.keys(WORDS);

function getRandomWord() {
  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  const arr = WORDS[cat];
  return { category: cat, word: arr[Math.floor(Math.random() * arr.length)] };
}

// ── 상태 ──
let myName = '';
let myId = '';
let roomCode = '';
let isHost = false;
let currentScreen = 'home';
let listeners = {};
let timerInterval = null;
let roundData = null;
let totalRounds = 8;
let currentHints = '';

// ── 유틸 ──
function genId() { return Math.random().toString(36).slice(2, 10); }
function genRoomCode() { return Math.random().toString(36).slice(2,6).toUpperCase(); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  currentScreen = id;
}
function clearListeners() {
  Object.values(listeners).forEach(unsub => { try { unsub(); } catch(e){} });
  listeners = {};
}

// ── 홈 ──
window.goCreateRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }
  myName = name;
  myId = genId();
  roomCode = genRoomCode();
  isHost = true;

  await set(ref(db, `rooms/${roomCode}`), {
    host: myId,
    status: 'lobby',
    totalRounds: 8,
    currentRound: 0,
    createdAt: serverTimestamp()
  });
  await set(ref(db, `rooms/${roomCode}/players/${myId}`), {
    name: myName, score: 0, isHost: true, joinedAt: serverTimestamp()
  });

  enterLobby();
};

window.goJoinRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  const code = document.getElementById('input-room-code').value.trim().toUpperCase();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }
  if (!code || code.length !== 4) { alert('방 코드를 확인해주세요!'); return; }

  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { alert('존재하지 않는 방이에요!'); return; }
  const room = snap.val();
  if (room.status !== 'lobby') { alert('이미 게임이 시작된 방이에요!'); return; }

  myName = name;
  myId = genId();
  roomCode = code;
  isHost = false;

  await set(ref(db, `rooms/${roomCode}/players/${myId}`), {
    name: myName, score: 0, isHost: false, joinedAt: serverTimestamp()
  });

  enterLobby();
};

// ── 로비 ──
function enterLobby() {
  document.getElementById('lobby-room-code').textContent = roomCode;
  document.getElementById('lobby-host-section').style.display = isHost ? 'block' : 'none';
  document.getElementById('lobby-guest-section').style.display = isHost ? 'none' : 'block';
  showScreen('lobby');
  listenLobby();
}

function listenLobby() {
  // 플레이어 목록
  const playersRef = ref(db, `rooms/${roomCode}/players`);
  listeners.players = onValue(playersRef, snap => {
    const players = snap.val() || {};
    const hostId = Object.entries(players).find(([,p]) => p.isHost)?.[0];
    document.getElementById('lobby-count').textContent = Object.keys(players).length;
    const list = document.getElementById('lobby-players');
    list.innerHTML = Object.entries(players).map(([id, p]) => {
      let cls = 'player-chip';
      if (id === hostId) cls += ' host';
      if (id === myId) cls += ' me';
      return `<span class="${cls}">${p.name}</span>`;
    }).join('');
  });

  // 게임 시작 감지
  const statusRef = ref(db, `rooms/${roomCode}/status`);
  listeners.status = onValue(statusRef, snap => {
    if (snap.val() === 'playing') {
      off(ref(db, `rooms/${roomCode}/players`));
      off(ref(db, `rooms/${roomCode}/status`));
      delete listeners.players;
      delete listeners.status;
      initGame();
    }
  });
}

window.leaveRoom = async function() {
  clearListeners();
  clearTimerInterval();
  if (roomCode) {
    await remove(ref(db, `rooms/${roomCode}/players/${myId}`));
  }
  showScreen('home');
};

// ── 게임 시작 ──
window.startGame = async function() {
  const rounds = parseInt(document.getElementById('select-rounds').value);
  totalRounds = rounds;
  await update(ref(db, `rooms/${roomCode}`), { totalRounds: rounds, status: 'playing', currentRound: 0 });
};

async function initGame() {
  // totalRounds 읽기
  const snap = await get(ref(db, `rooms/${roomCode}/totalRounds`));
  if (snap.exists()) totalRounds = snap.val();

  showScreen('game');
  listenGame();
}

// ── 게임 리스닝 ──
function listenGame() {
  // 라운드 데이터
  const roundRef = ref(db, `rooms/${roomCode}/round`);
  listeners.round = onValue(roundRef, async snap => {
    if (!snap.exists()) {
      if (isHost) await startNextRound();
      return;
    }
    roundData = snap.val();
    renderRound(roundData);
  });

  // 채팅
  const chatRef = ref(db, `rooms/${roomCode}/chat`);
  listeners.chat = onValue(chatRef, snap => {
    const msgs = snap.val() ? Object.values(snap.val()).sort((a,b) => a.ts - b.ts) : [];
    renderChat(msgs);
  });

  // 상태 (결과)
  const statusRef = ref(db, `rooms/${roomCode}/status`);
  listeners.statusGame = onValue(statusRef, snap => {
    if (snap.val() === 'result') showResult();
  });
}

async function startNextRound() {
  const snap = await get(ref(db, `rooms/${roomCode}/currentRound`));
  const cur = snap.val() || 0;
  const next = cur + 1;

  if (next > totalRounds) {
    await update(ref(db, `rooms/${roomCode}`), { status: 'result' });
    return;
  }

  // 순서 결정 (플레이어 목록)
  const pSnap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = Object.entries(pSnap.val() || {});
  const questionerId = players[(next - 1) % players.length][0];
  const questionerName = players[(next - 1) % players.length][1].name;

  const { category, word } = getRandomWord();

  // 채팅 초기화
  await remove(ref(db, `rooms/${roomCode}/chat`));

  await update(ref(db, `rooms/${roomCode}`), { currentRound: next });
  await set(ref(db, `rooms/${roomCode}/round`), {
    roundNum: next,
    questionerId,
    questionerName,
    category,
    word,
    hints: '',
    solved: false,
    startedAt: Date.now()
  });

  addSystemMsg(`🎲 ${next}라운드 시작! ${questionerName}이(가) 설명합니다`);
}

function renderRound(rd) {
  if (!rd) return;

  document.getElementById('game-round-badge').textContent = `${rd.roundNum}/${totalRounds}`;

  const isQuestioner = rd.questionerId === myId;
  document.getElementById('questioner-view').style.display = isQuestioner ? 'block' : 'none';
  document.getElementById('guesser-view').style.display = isQuestioner ? 'none' : 'block';
  document.getElementById('hint-input-area').style.display = isQuestioner && !rd.solved ? 'flex' : 'none';
  document.getElementById('answer-input-area').style.display = !isQuestioner && !rd.solved ? 'flex' : 'none';

  if (isQuestioner) {
    document.getElementById('word-category').textContent = rd.category;
    document.getElementById('word-display').textContent = rd.word;
  } else {
    document.getElementById('questioner-name-display').textContent = `${rd.questionerName}이(가) 설명 중 💬`;
    document.getElementById('hint-display').textContent = rd.hints || '힌트를 기다리는 중...';
  }

  // 타이머
  clearTimerInterval();
  if (!rd.solved) startTimer(rd.startedAt);
}

// ── 타이머 ──
function startTimer(startedAt) {
  const DURATION = 60;
  function tick() {
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    const left = Math.max(0, DURATION - elapsed);
    document.getElementById('timer-num').textContent = left;
    const pct = (left / DURATION) * 100;
    const bar = document.getElementById('timer-bar');
    bar.style.width = pct + '%';
    bar.style.background = left > 20 ? '#f5a623' : '#e94560';
    if (left <= 0) {
      clearTimerInterval();
      if (isHost) timeUp();
    }
  }
  tick();
  timerInterval = setInterval(tick, 500);
}

function clearTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

async function timeUp() {
  if (!roundData || roundData.solved) return;
  addSystemMsg(`⏰ 시간 초과! 정답은 "${roundData.word}"이었어요`);
  await update(ref(db, `rooms/${roomCode}/round`), { solved: true });
  setTimeout(() => { if (isHost) startNextRound(); }, 2500);
}

// ── 힌트 전송 (출제자) ──
window.sendHint = async function() {
  const input = document.getElementById('hint-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const newHints = (roundData?.hints ? roundData.hints + '\n' : '') + text;
  await update(ref(db, `rooms/${roomCode}/round`), { hints: newHints });

  // 채팅에도 표시
  await push(ref(db, `rooms/${roomCode}/chat`), {
    name: myName,
    text: `💬 ${text}`,
    type: 'hint',
    ts: Date.now()
  });
};

document.getElementById('hint-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.sendHint();
});

// ── 정답 제출 ──
window.submitAnswer = async function() {
  const input = document.getElementById('answer-input');
  const text = input.value.trim();
  if (!text || !roundData || roundData.solved) return;
  input.value = '';

  // 채팅에 추가
  await push(ref(db, `rooms/${roomCode}/chat`), {
    name: myName,
    text,
    type: 'answer',
    senderId: myId,
    ts: Date.now()
  });

  // 정답 체크 (유사 매칭)
  const correct = checkAnswer(text, roundData.word);
  if (correct) {
    // 정답!
    clearTimerInterval();
    showCorrectOverlay();
    addSystemMsg(`🎉 ${myName}이(가) 정답! "${roundData.word}"`);

    // 점수 업데이트
    const pSnap = await get(ref(db, `rooms/${roomCode}/players/${myId}`));
    const curScore = pSnap.val()?.score || 0;
    await update(ref(db, `rooms/${roomCode}/players/${myId}`), { score: curScore + 10 });

    // 출제자도 점수
    const qSnap = await get(ref(db, `rooms/${roomCode}/players/${roundData.questionerId}`));
    const qScore = qSnap.val()?.score || 0;
    await update(ref(db, `rooms/${roomCode}/players/${roundData.questionerId}`), { score: qScore + 5 });

    await update(ref(db, `rooms/${roomCode}/round`), { solved: true, solverId: myId });

    setTimeout(() => { if (isHost) startNextRound(); }, 2500);
  }
};

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.submitAnswer();
});

function checkAnswer(input, answer) {
  const a = input.replace(/\s/g,'').toLowerCase();
  const b = answer.replace(/\s/g,'').toLowerCase();
  if (a === b) return true;
  // 부분 포함 (짧은 단어)
  if (b.length <= 3 && a === b) return true;
  if (b.length > 3 && (a.includes(b) || b.includes(a))) return true;
  return false;
}

// ── 채팅 렌더 ──
function renderChat(msgs) {
  const area = document.getElementById('chat-area');
  area.innerHTML = msgs.map(m => {
    if (m.type === 'system') {
      return `<div class="chat-msg system"><div class="msg-bubble">${m.text}</div></div>`;
    }
    if (m.type === 'correct') {
      return `<div class="chat-msg system correct-msg"><div class="msg-bubble">🎉 ${m.text}</div></div>`;
    }
    const isMe = m.senderId === myId;
    const cls = isMe ? 'me' : 'other';
    return `<div class="chat-msg ${cls}">
      ${!isMe ? `<div class="msg-name">${m.name}</div>` : ''}
      <div class="msg-bubble">${m.text}</div>
    </div>`;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

async function addSystemMsg(text) {
  await push(ref(db, `rooms/${roomCode}/chat`), { type: 'system', text, ts: Date.now() });
}

// ── 정답 오버레이 ──
function showCorrectOverlay() {
  const el = document.getElementById('correct-overlay');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ── 결과 ──
async function showResult() {
  clearListeners();
  clearTimerInterval();
  showScreen('result');

  const pSnap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = Object.entries(pSnap.val() || {}).map(([id, p]) => ({ id, ...p }))
    .sort((a, b) => b.score - a.score);

  // 포디움
  const podium = document.getElementById('result-podium');
  const top3 = players.slice(0, 3);
  const order = top3.length >= 3 ? [1, 0, 2] : top3.length === 2 ? [1, 0] : [0];
  const ranks = ['🥇', '🥈', '🥉'];
  const classes = ['p1', 'p2', 'p3'];
  podium.innerHTML = order.map(i => {
    const p = top3[i];
    if (!p) return '';
    return `<div class="podium-item ${classes[i]}">
      <div class="podium-rank">${ranks[i]}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-score">${p.score}점</div>
      <div class="podium-bar"></div>
    </div>`;
  }).join('');

  // 전체 순위
  const rankList = document.getElementById('result-rank-list');
  rankList.innerHTML = players.map((p, i) => `
    <div class="rank-item">
      <div class="rank-num">${i + 1}</div>
      <div class="rank-name">${p.name}${p.id === myId ? ' (나)' : ''}</div>
      <div class="rank-score">${p.score}점</div>
    </div>
  `).join('');

  if (isHost) document.getElementById('btn-play-again').style.display = 'block';
}

window.playAgain = async function() {
  // 점수 초기화
  const pSnap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = pSnap.val() || {};
  const updates = {};
  Object.keys(players).forEach(id => { updates[`rooms/${roomCode}/players/${id}/score`] = 0; });
  await update(ref(db), updates);
  await remove(ref(db, `rooms/${roomCode}/round`));
  await remove(ref(db, `rooms/${roomCode}/chat`));
  await update(ref(db, `rooms/${roomCode}`), { status: 'playing', currentRound: 0 });
  showScreen('game');
  listenGame();
};

window.goHome = function() {
  clearListeners();
  clearTimerInterval();
  showScreen('home');
};
</script>
</body>
</html>

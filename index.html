<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 말해봐!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #f5a623;
    --accent3: #00d4aa;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px; }
  .screen.active { display: flex; }

  .logo { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 4px; letter-spacing: -1px; }
  .logo span { color: var(--accent); }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: transform 0.1s, opacity 0.1s; margin-bottom: 12px;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-green { background: var(--accent3); color: #000; }
  .btn-sm { width: auto; padding: 10px 20px; font-size: 0.85rem; margin-bottom: 0; border-radius: 10px; }

  .input {
    width: 100%; padding: 14px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; margin-bottom: 12px;
    outline: none; transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--muted); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  /* 로비 */
  #screen-lobby .room-code { font-size: 2.8rem; font-weight: 900; text-align: center; letter-spacing: 10px; color: var(--accent2); margin: 8px 0; }
  .player-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .player-chip { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: var(--surface); border: 1px solid var(--border); }
  .player-chip.host::after { content: ' 👑'; }
  .player-chip.me { border-color: var(--accent3); color: var(--accent3); }

  /* 게임 화면 - 고정 레이아웃 */
  #screen-game {
    padding: 0;
    display: none;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #screen-game.active { display: flex; }

  .game-header {
    flex-shrink: 0;
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .round-badge { background: var(--accent); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .timer-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .timer-bar { height: 100%; background: var(--accent2); border-radius: 3px; transition: width 1s linear, background 0.5s; }
  .timer-num { font-weight: 900; font-size: 1rem; min-width: 28px; text-align: right; }
  .timer-num.urgent { color: var(--accent); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* 출제자/정답자 패널 - 고정 높이 */
  .info-panel {
    flex-shrink: 0;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .questioner-panel {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid var(--accent);
    border-radius: 16px;
    padding: 14px 16px;
    text-align: center;
  }
  .word-reveal { font-size: 1.8rem; font-weight: 900; color: var(--accent2); margin: 6px 0 4px; letter-spacing: 2px; }
  .category-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; background: var(--accent); color: #fff; margin-bottom: 4px; }

  .guesser-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 14px;
  }
  .questioner-name { font-size: 0.95rem; font-weight: 700; color: var(--accent3); margin-bottom: 6px; }
  .hint-display {
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
    min-height: 44px;
    max-height: 80px;
    overflow-y: auto;
    font-size: 0.9rem;
    line-height: 1.5;
    text-align: left;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* 채팅 - 남은 공간 차지 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }

  .chat-msg { display: flex; flex-direction: column; max-width: 80%; }
  .chat-msg.me { align-self: flex-end; align-items: flex-end; }
  .chat-msg.other { align-self: flex-start; }
  .chat-msg.system { align-self: center; max-width: 100%; }
  .msg-name { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
  .msg-bubble { padding: 8px 12px; border-radius: 14px; font-size: 0.88rem; line-height: 1.4; word-break: break-all; }

  /* 말풍선 컬러 - 사람마다 다른 색 */
  .chat-msg.me .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.color-0 .msg-bubble { background: #2d4a7a; border-bottom-left-radius: 4px; }
  .chat-msg.color-1 .msg-bubble { background: #4a2d6e; border-bottom-left-radius: 4px; }
  .chat-msg.color-2 .msg-bubble { background: #2d6e4a; border-bottom-left-radius: 4px; }
  .chat-msg.color-3 .msg-bubble { background: #6e4a2d; border-bottom-left-radius: 4px; }
  .chat-msg.color-4 .msg-bubble { background: #5a2d4a; border-bottom-left-radius: 4px; }
  .chat-msg.hint-bubble .msg-bubble { background: #1e3a5f; border-left: 3px solid var(--accent2); border-bottom-left-radius: 4px; }
  .chat-msg.system .msg-bubble { background: transparent; color: var(--accent2); font-weight: 700; font-size: 0.82rem; text-align: center; padding: 4px 0; }

  /* 입력 영역 - 항상 하단 고정 */
  .input-area {
    flex-shrink: 0;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .input-row { display: flex; gap: 8px; }
  .input-row .input { margin-bottom: 0; flex: 1; padding: 12px 14px; font-size: 0.95rem; }

  /* 결과 화면 */
  #screen-result { text-align: center; }
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin: 20px 0; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .podium-rank { font-size: 1.4rem; }
  .podium-name { font-size: 0.78rem; font-weight: 700; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-score { font-size: 0.85rem; color: var(--accent2); font-weight: 700; }
  .podium-bar { width: 60px; border-radius: 8px 8px 0 0; }
  .p1 .podium-bar { background: var(--accent2); height: 90px; }
  .p2 .podium-bar { background: #aaa; height: 65px; }
  .p3 .podium-bar { background: #cd7f32; height: 45px; }
  .rank-list { text-align: left; }
  .rank-item { display: flex; align-items: center; padding: 12px 16px; background: var(--card); border-radius: 12px; margin-bottom: 8px; gap: 12px; }
  .rank-num { font-size: 1.2rem; font-weight: 900; width: 28px; }
  .rank-name { flex: 1; font-weight: 600; }
  .rank-score { color: var(--accent2); font-weight: 700; }

  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 정답 팝업 */
  .correct-popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .correct-popup.show { opacity: 1; }
  .correct-popup-box {
    background: linear-gradient(135deg, #0d2b1a, #0a1f2e);
    border: 3px solid var(--accent3);
    border-radius: 28px;
    padding: 36px 40px;
    text-align: center;
    transform: scale(0.7);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 300px;
    width: 85%;
  }
  .correct-popup.show .correct-popup-box { transform: scale(1); }
  .correct-popup-emoji { font-size: 3.5rem; margin-bottom: 8px; }
  .correct-popup-title { font-size: 1.6rem; font-weight: 900; color: var(--accent3); margin-bottom: 6px; }
  .correct-popup-name { font-size: 1.1rem; color: var(--text); margin-bottom: 4px; }
  .correct-popup-word { font-size: 1.4rem; font-weight: 900; color: var(--accent2); }

  /* 폭죽 캔버스 */
  #fireworks-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 199;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #fireworks-canvas.show { opacity: 1; }

  .text-center { text-align: center; }
  .text-muted { color: var(--muted); font-size: 0.85rem; }
  .mt-auto { margin-top: auto; }
  .gap-row { display: flex; gap: 8px; }
</style>
</head>
<body>
<div id="app">

  <!-- ① 시작 화면 -->
  <div class="screen active" id="screen-home">
    <div style="margin-top: 56px;">
      <div class="logo">🎯 말<span>해</span>봐!</div>
      <div class="subtitle">설명하면 맞추는 실시간 퀴즈</div>
    </div>
    <div class="card">
      <div class="label">닉네임</div>
      <input class="input" id="input-name" placeholder="닉네임 입력" maxlength="8">
    </div>
    <button class="btn btn-primary" onclick="goCreateRoom()">🏠 방 만들기</button>
    <div style="text-align:center; color:var(--muted); font-size:0.85rem; margin: 4px 0 12px;">또는</div>
    <div class="card">
      <div class="label">방 코드 입력</div>
      <div class="gap-row">
        <input class="input" id="input-room-code" placeholder="4자리 숫자" maxlength="4"
          style="margin-bottom:0; letter-spacing:6px; font-weight:900; font-size:1.2rem;"
          inputmode="numeric" pattern="[0-9]*">
        <button class="btn btn-green btn-sm" style="white-space:nowrap" onclick="goJoinRoom()">입장</button>
      </div>
    </div>
    <div class="mt-auto text-center text-muted" style="padding: 20px 0;">
      영화·음식·나라·동물·아이돌 랜덤 제시어<br>설명하고 맞추고 점수 쌓기!
    </div>
  </div>

  <!-- ② 로비 화면 -->
  <div class="screen" id="screen-lobby">
    <div class="logo" style="font-size:1.4rem; margin-top:20px;">🎯 말해봐!</div>
    <div class="card" style="text-align:center; margin-top:16px;">
      <div class="label">방 코드</div>
      <div class="room-code" id="lobby-room-code">----</div>
      <div class="text-muted">친구들에게 코드를 알려주세요</div>
    </div>
    <div class="card">
      <div class="label">참가자 <span id="lobby-count">0</span>명</div>
      <div class="player-list" id="lobby-players"></div>
    </div>
    <div id="lobby-host-section" style="display:none;">
      <div class="card" style="background: var(--surface);">
        <div class="label">라운드 설정</div>
        <div class="gap-row" style="align-items:center; margin-bottom:8px;">
          <span style="font-size:0.9rem;">라운드 수</span>
          <select class="input" id="select-rounds" style="margin-bottom:0; width:auto; flex:1;">
            <option value="5">5라운드</option>
            <option value="8" selected>8라운드</option>
            <option value="10">10라운드</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-start" onclick="startGame()">🎮 게임 시작!</button>
    </div>
    <div id="lobby-guest-section" style="display:none;">
      <div class="card text-center">
        <div class="spinner"></div>
        <div class="text-muted">방장이 게임을 시작하길 기다리는 중...</div>
      </div>
    </div>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="leaveRoom()">나가기</button>
  </div>

  <!-- ③ 게임 화면 -->
  <div class="screen" id="screen-game">
    <!-- 상단 타이머/라운드 -->
    <div class="game-header">
      <div class="round-badge" id="game-round-badge">1/8</div>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar" style="width:100%"></div>
      </div>
      <div class="timer-num" id="timer-num">90</div>
    </div>

    <!-- 정보 패널 (고정) -->
    <div class="info-panel" id="info-panel">
      <!-- 출제자 뷰 -->
      <div id="questioner-view" style="display:none;">
        <div class="questioner-panel">
          <div><span class="category-badge" id="word-category">영화</span></div>
          <div class="word-reveal" id="word-display">???</div>
          <div class="text-muted" style="font-size:0.75rem;">직접 제시어를 말하면 안 돼요!</div>
        </div>
      </div>
      <!-- 정답자 뷰 -->
      <div id="guesser-view" style="display:none;">
        <div class="guesser-panel">
          <div class="questioner-name" id="questioner-name-display">○○가 설명 중 💬</div>
          <div class="hint-display" id="hint-display">힌트를 기다리는 중...</div>
        </div>
      </div>
    </div>

    <!-- 채팅 (스크롤) -->
    <div class="chat-area" id="chat-area"></div>

    <!-- 입력 영역 (고정 하단) -->
    <div class="input-area" id="hint-input-area" style="display:none;">
      <div class="input-row">
        <input class="input" id="hint-input" placeholder="힌트 입력 (제시어는 말하면 안됨!)" maxlength="50">
        <button class="btn btn-primary btn-sm" onclick="sendHint()">전송</button>
      </div>
    </div>
    <div class="input-area" id="answer-input-area" style="display:none;">
      <div class="input-row">
        <input class="input" id="answer-input" placeholder="정답 입력..." maxlength="20">
        <button class="btn btn-green btn-sm" onclick="submitAnswer()">제출</button>
      </div>
    </div>
  </div>

  <!-- ④ 결과 화면 -->
  <div class="screen" id="screen-result">
    <div class="logo" style="font-size:1.4rem; margin-top: 24px;">🏆 최종 결과</div>
    <div class="podium" id="result-podium"></div>
    <div class="rank-list" id="result-rank-list"></div>
    <div style="margin-top: 24px;">
      <button class="btn btn-primary" id="btn-play-again" onclick="playAgain()" style="display:none;">한 판 더!</button>
      <button class="btn btn-secondary" onclick="goHome()">처음으로</button>
    </div>
  </div>

</div>

<!-- 폭죽 캔버스 -->
<canvas id="fireworks-canvas"></canvas>

<!-- 정답 팝업 -->
<div class="correct-popup" id="correct-popup">
  <div class="correct-popup-box">
    <div class="correct-popup-emoji">🎉</div>
    <div class="correct-popup-title">정답!</div>
    <div class="correct-popup-name" id="popup-solver-name"></div>
    <div class="correct-popup-word" id="popup-word"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, push, remove, serverTimestamp, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp9TYq3TQEUCO5qge2SVsjUaDcplEYTwM",
  authDomain: "qiuz-441e9.firebaseapp.com",
  databaseURL: "https://qiuz-441e9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "qiuz-441e9",
  storageBucket: "qiuz-441e9.firebasestorage.app",
  messagingSenderId: "1087947884980",
  appId: "1:1087947884980:web:5b2f948c91e20b28148ae1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 배경음악 (Web Audio 긴박한 루프) ──
let bgmNodes = [];
let bgmPlaying = false;
let bgmGain = null;

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  try {
    const ctx = getAudio();
    bgmGain = ctx.createGain();
    bgmGain.gain.value = 0.18;
    bgmGain.connect(ctx.destination);
    scheduleBGM(ctx, ctx.currentTime);
  } catch(e) {}
}

function stopBGM() {
  bgmPlaying = false;
  try {
    if (bgmGain) {
      bgmGain.gain.setValueAtTime(bgmGain.gain.value, getAudio().currentTime);
      bgmGain.gain.exponentialRampToValueAtTime(0.001, getAudio().currentTime + 0.5);
    }
    bgmNodes.forEach(n => { try { n.stop(getAudio().currentTime + 0.6); } catch(e){} });
    bgmNodes = [];
  } catch(e) {}
}

function scheduleBGM(ctx, startTime) {
  if (!bgmPlaying) return;
  // 긴박한 베이스라인 패턴 (120bpm, 16분음표)
  const bpm = 128;
  const beat = 60 / bpm;
  const s16 = beat / 4;

  // 킥드럼 패턴
  const kicks = [0, 2, 4, 6];
  kicks.forEach(b => {
    makeKick(ctx, startTime + b * beat);
  });

  // 하이햇 (8분음표)
  for (let i = 0; i < 16; i++) {
    makeHihat(ctx, startTime + i * s16 * 2, i % 2 === 0 ? 0.6 : 0.3);
  }

  // 긴박한 베이스 멜로디
  const bassNotes = [55, 55, 58, 55, 52, 55, 50, 52];
  bassNotes.forEach((freq, i) => {
    makeBass(ctx, startTime + i * beat * 0.5, freq, beat * 0.4);
  });

  // 긴장감 있는 리드 멜로디
  const leadNotes = [
    {f:440,t:0},{f:440,t:0.5},{f:494,t:1},{f:440,t:1.5},
    {f:523,t:2},{f:494,t:2.5},{f:440,t:3},{f:415,t:3.5}
  ];
  leadNotes.forEach(({f,t}) => {
    makeLead(ctx, startTime + t * beat, f, beat * 0.35);
  });

  const loopLen = 4 * beat * 2; // 8비트 루프
  const loopTimer = setTimeout(() => scheduleBGM(ctx, startTime + loopLen), (loopLen - 0.1) * 1000);
  bgmNodes.push({ stop: () => clearTimeout(loopTimer) });
}

function makeKick(ctx, t) {
  if (!bgmPlaying) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(bgmGain);
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  g.gain.setValueAtTime(1.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.start(t); o.stop(t + 0.3);
  bgmNodes.push(o);
}

function makeHihat(ctx, t, vol) {
  if (!bgmPlaying) return;
  const bufSize = ctx.sampleRate * 0.05;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const bpf = ctx.createBiquadFilter();
  bpf.type = 'highpass'; bpf.frequency.value = 8000;
  const g = ctx.createGain();
  src.connect(bpf); bpf.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(vol * 0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  src.start(t); src.stop(t + 0.06);
  bgmNodes.push(src);
}

function makeBass(ctx, t, freq, dur) {
  if (!bgmPlaying) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(bgmGain);
  o.type = 'sawtooth'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
  bgmNodes.push(o);
}

function makeLead(ctx, t, freq, dur) {
  if (!bgmPlaying) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(bgmGain);
  o.type = 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
  bgmNodes.push(o);
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;

    g.gain.setValueAtTime(0.15, ctx.currentTime);

    o.start(); o.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

function playCorrect() {

      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = ctx.currentTime + i * 0.1;
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);

}

function playTimeUp() {

// ── 폭죽 ──
const canvas = document.getElementById('fireworks-canvas');
const fctx = canvas.getContext('2d');
let particles = [];
let animFrame = null;

function launchFireworks() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('show');
  particles = [];
  for (let i = 0; i < 120; i++) {
    const angle = (Math.PI * 2 * i) / 120;
    const speed = 3 + Math.random() * 6;
    const colors = ['#f5a623','#e94560','#00d4aa','#a78bfa','#fbbf24','#34d399'];
    particles.push({
      x: window.innerWidth / 2,
      y: window.innerHeight * 0.4,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1, size: 4 + Math.random() * 4
    });
  }
  // 두 번째 폭죽
  setTimeout(() => {
    for (let i = 0; i < 80; i++) {
      const angle = (Math.PI * 2 * i) / 80;
      const speed = 2 + Math.random() * 5;
      const colors = ['#f5a623','#fff','#00d4aa','#e94560'];
      particles.push({
        x: window.innerWidth * 0.3 + Math.random() * window.innerWidth * 0.4,
        y: window.innerHeight * 0.35,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1, size: 3 + Math.random() * 3
      });
    }
  }, 200);
  animateFireworks();
}

function animateFireworks() {
  fctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0.01);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15; p.vx *= 0.98;
    p.life -= 0.018;
    fctx.globalAlpha = p.life;
    fctx.fillStyle = p.color;
    fctx.beginPath();
    fctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    fctx.fill();
  });
  fctx.globalAlpha = 1;
  if (particles.length > 0) {
    animFrame = requestAnimationFrame(animateFireworks);
  } else {
    canvas.classList.remove('show');
  }
}

  await set(ref(db, `rooms/${roomCode}/players/${myId}`), { name: myName, score: 0, isHost: true, joinedAt: serverTimestamp() });

};

window.goJoinRoom = async function() {
  const name = document.getElementById('input-name').value.trim();
  const code = document.getElementById('input-room-code').value.trim();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }

// ── 로비 ──
function enterLobby() {
  document.getElementById('lobby-room-code').textContent = roomCode;
  document.getElementById('lobby-host-section').style.display = isHost ? 'block' : 'none';
  document.getElementById('lobby-guest-section').style.display = isHost ? 'none' : 'block';
  showScreen('lobby');
  listenLobby();
}

function listenLobby() {
  listeners.players = onValue(ref(db, `rooms/${roomCode}/players`), snap => {
    const players = snap.val() || {};
    const hostId = Object.entries(players).find(([,p]) => p.isHost)?.[0];
    document.getElementById('lobby-count').textContent = Object.keys(players).length;
    document.getElementById('lobby-players').innerHTML = Object.entries(players).map(([id, p]) => {
      let cls = 'player-chip';
      if (id === hostId) cls += ' host';
      if (id === myId) cls += ' me';
      return `<span class="${cls}">${p.name}</span>`;
    }).join('');
  });
  listeners.status = onValue(ref(db, `rooms/${roomCode}/status`), snap => {
    if (snap.val() === 'playing') {
      off(ref(db, `rooms/${roomCode}/players`));
      off(ref(db, `rooms/${roomCode}/status`));
      delete listeners.players; delete listeners.status;
      initGame();
    }
  });
}

window.leaveRoom = async function() {
  clearListeners(); clearTimerInterval();
  if (roomCode) await remove(ref(db, `rooms/${roomCode}/players/${myId}`));
  stopBGM(); showScreen('home');
};

window.startGame = async function() {
  const rounds = parseInt(document.getElementById('select-rounds').value);
  totalRounds = rounds;
  await update(ref(db, `rooms/${roomCode}`), { totalRounds: rounds, status: 'playing', currentRound: 0 });
};

async function initGame() {
  const snap = await get(ref(db, `rooms/${roomCode}/totalRounds`));
  if (snap.exists()) totalRounds = snap.val();
  showScreen('game');
  startBGM();
  listenGame();
}

// ── 게임 리스닝 ──
function listenGame() {
  listeners.round = onValue(ref(db, `rooms/${roomCode}/round`), async snap => {
    if (!snap.exists()) {
      if (isHost) await startNextRound();
      return;
    }
    const rd = snap.val();
    // solved 새로 true 됐을 때
    if (rd.solved && roundData && !roundData.solved) {
      showCorrectPopup(rd.solverName || '누군가', rd.word);
      clearTimerInterval();
      // 방장만 다음 라운드 시작 (타이머 한 번만 실행)
      if (isHost) {
        setTimeout(() => startNextRound(), 3500);
      }
    }
    roundData = rd;
    roundSolvedHandled = rd.solved;
    renderRound(rd);
  });

  listeners.chat = onValue(ref(db, `rooms/${roomCode}/chat`), snap => {
    const msgs = snap.val() ? Object.values(snap.val()).sort((a,b) => a.ts - b.ts) : [];
    renderChat(msgs);
  });

  listeners.statusGame = onValue(ref(db, `rooms/${roomCode}/status`), snap => {
    if (snap.val() === 'result') showResult();
  });
}

async function startNextRound() {
  const snap = await get(ref(db, `rooms/${roomCode}/currentRound`));
  const cur = snap.val() || 0;
  const next = cur + 1;
  if (next > totalRounds) {
    await update(ref(db, `rooms/${roomCode}`), { status: 'result' });
    return;
  }
  const pSnap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = Object.entries(pSnap.val() || {});
  const qi = (next - 1) % players.length;
  const questionerId = players[qi][0];
  const questionerName = players[qi][1].name;
  const { category, word } = getRandomWord();
  await remove(ref(db, `rooms/${roomCode}/chat`));
  await update(ref(db, `rooms/${roomCode}`), { currentRound: next });
  await set(ref(db, `rooms/${roomCode}/round`), {
    roundNum: next, questionerId, questionerName, category, word,
    hints: '', solved: false, startedAt: Date.now()
  });
  await addSystemMsg(`🎲 ${next}라운드! ${questionerName}이(가) 설명합니다`);
}

function renderRound(rd) {
  if (!rd) return;
  document.getElementById('game-round-badge').textContent = `${rd.roundNum}/${totalRounds}`;
  const isQ = rd.questionerId === myId;
  document.getElementById('questioner-view').style.display = isQ ? 'block' : 'none';
  document.getElementById('guesser-view').style.display = isQ ? 'none' : 'block';
  document.getElementById('hint-input-area').style.display = isQ && !rd.solved ? 'block' : 'none';
  document.getElementById('answer-input-area').style.display = !isQ && !rd.solved ? 'block' : 'none';
  if (isQ) {
    document.getElementById('word-category').textContent = rd.category;
    document.getElementById('word-display').textContent = rd.word;
  } else {
    document.getElementById('questioner-name-display').textContent = `${rd.questionerName}이(가) 설명 중 💬`;
    document.getElementById('hint-display').textContent = rd.hints || '힌트를 기다리는 중...';
  }
  clearTimerInterval();
  if (!rd.solved) startTimer(rd.startedAt);
}

// ── 타이머 ──
const DURATION = 90;
function startTimer(startedAt) {
  lastTickSecond = -1;
  function tick() {
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    const left = Math.max(0, DURATION - elapsed);
    const timerNum = document.getElementById('timer-num');
    timerNum.textContent = left;
    timerNum.className = 'timer-num' + (left <= 10 ? ' urgent' : '');
    const pct = (left / DURATION) * 100;
    const bar = document.getElementById('timer-bar');
    bar.style.width = pct + '%';
    bar.style.background = left > 30 ? '#f5a623' : left > 10 ? '#ff6b35' : '#e94560';
    // 10초 이하 째깍째깍
    if (left <= 10 && left > 0 && left !== lastTickSecond) {
      lastTickSecond = left;
      playTick();
    }
    if (left <= 0) {
      clearTimerInterval();
      if (isHost) timeUp();
    }
  }
  tick();
  timerInterval = setInterval(tick, 300);
}

function clearTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

async function timeUp() {
  if (!roundData || roundData.solved) return;
  playTimeUp();
  await addSystemMsg(`⏰ 시간 초과! 정답은 "${roundData.word}"이었어요`);
  await update(ref(db, `rooms/${roomCode}/round`), { solved: true });
  // 방장이 round onValue에서 감지해서 처리
}

// ── 힌트 전송 ──
window.sendHint = async function() {
  const input = document.getElementById('hint-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const newHints = (roundData?.hints ? roundData.hints + '\n' : '') + text;
  await update(ref(db, `rooms/${roomCode}/round`), { hints: newHints });
  await push(ref(db, `rooms/${roomCode}/chat`), {
    name: myName, text, type: 'hint', senderId: myId, ts: Date.now()
  });
};
document.getElementById('hint-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.sendHint(); });

// ── 정답 제출 ──
window.submitAnswer = async function() {
  const input = document.getElementById('answer-input');
  const text = input.value.trim();
  if (!text || !roundData || roundData.solved) return;
  input.value = '';
  await push(ref(db, `rooms/${roomCode}/chat`), {
    name: myName, text, type: 'answer', senderId: myId, ts: Date.now()
  });
  if (checkAnswer(text, roundData.word)) {
    clearTimerInterval();
    playCorrect();
    // 점수
    const pSnap = await get(ref(db, `rooms/${roomCode}/players/${myId}`));
    await update(ref(db, `rooms/${roomCode}/players/${myId}`), { score: (pSnap.val()?.score || 0) + 10 });
    const qSnap = await get(ref(db, `rooms/${roomCode}/players/${roundData.questionerId}`));
    await update(ref(db, `rooms/${roomCode}/players/${roundData.questionerId}`), { score: (qSnap.val()?.score || 0) + 5 });
    await update(ref(db, `rooms/${roomCode}/round`), { solved: true, solverId: myId, solverName: myName });
    // 방장이 onValue로 감지해서 startNextRound 호출 (아래 listenGame 참고)
  }
};
document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.submitAnswer(); });

function checkAnswer(input, answer) {
  const a = input.replace(/\s/g,'').toLowerCase();
  const b = answer.replace(/\s/g,'').toLowerCase();
  if (a === b) return true;
  if (b.length > 3 && (a.includes(b) || b.includes(a))) return true;
  return false;
}

// ── 채팅 렌더 ──
function renderChat(msgs) {
  const area = document.getElementById('chat-area');
  area.innerHTML = msgs.map(m => {
    if (m.type === 'system') return `<div class="chat-msg system"><div class="msg-bubble">${m.text}</div></div>`;
    const isMe = m.senderId === myId;
    if (isMe) return `<div class="chat-msg me"><div class="msg-bubble">${m.text}</div></div>`;
    const colorCls = m.type === 'hint' ? 'hint-bubble' : getColorClass(m.senderId || m.name);
    return `<div class="chat-msg other ${colorCls}">
      <div class="msg-name">${m.name}</div>
      <div class="msg-bubble">${m.text}</div>
    </div>`;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

  await update(ref(db, `rooms/${roomCode}`), { status: 'playing', currentRound: 0 });
  showScreen('game');
  startBGM();
  listenGame();
};

window.goHome = function() { clearListeners(); clearTimerInterval(); stopBGM(); showScreen('home'); };
</script>
</body>
</html>
